services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: list-endpoints-app:latest
    container_name: list-endpoints-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: --dns-result-order=ipv4first
      INTERNAL_APP_URL: http://127.0.0.1:3000
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env or the shell}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-}
      OPENAI_CHAT_MODELS: ${OPENAI_CHAT_MODELS:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-llama-3.3-70b-versatile}
      GROQ_CHAT_MODELS: ${GROQ_CHAT_MODELS:-}
      AI_CHAT_DEFAULT_PROVIDER: ${AI_CHAT_DEFAULT_PROVIDER:-}
      ENABLE_AI: ${ENABLE_AI:-true}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
