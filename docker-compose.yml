services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: list-endpoints-app:latest
    container_name: list-endpoints-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: --dns-result-order=ipv4first
      INTERNAL_APP_URL: http://127.0.0.1:3000
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env or the shell}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
