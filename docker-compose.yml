services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: list-endpoints-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # DELETE journal avoids WAL shm files on ./data bind mounts (Windows Docker Desktop)
      - SQLITE_JOURNAL_MODE=DELETE
      # Prefer IPv4 for localhost (Next.js internal RSC fetches in Alpine)
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - INTERNAL_APP_URL=http://127.0.0.1:3000
    volumes:
      # Mount data directory for persistence
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      # Use 127.0.0.1 (not "localhost") to avoid IPv6-first resolution failing in Alpine
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

